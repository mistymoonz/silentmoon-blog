# 站点基础配置
# 参考 Congo 主题配置结构

# 站点标识
title = "Silentmoon-静月"
copyright = "© 2026 静月博客. 保留所有权利."

# 内容设置
hasCJKLanguage = true
enableEmoji = true
summaryLength = 30
rssLimit = 20

# 文章设置
[frontmatter]
  date = ["date", "publishDate", "lastmod"]
  lastmod = [":git", "lastmod", "date", "publishDate"]
  publishDate = ["publishDate", "date"]
  expiryDate = ["expiryDate"]

# 相关文章
[related]
  includeNewer = true
  threshold = 80
  toLower = false
  [[related.indices]]
    name = "keywords"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10
    pattern = "2006"

# 站点地图
[sitemap]
  changeFreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
